<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DermAI — Error</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .error-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 520px;
            width: 90%;
            text-align: center;
        }
        .error-icon {
            width: 80px; height: 80px; border-radius: 20px;
            background: rgba(248,81,73,0.12);
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; color: #f85149;
            margin: 0 auto 24px;
        }
        h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; }
        .error-msg {
            background: rgba(248,81,73,0.08);
            border: 1px solid rgba(248,81,73,0.2);
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 0.85rem;
            color: #f85149;
            margin: 20px 0;
            text-align: left;
            display: flex; gap: 10px; align-items: flex-start;
        }
        .error-msg i { margin-top: 2px; flex-shrink: 0; }
        .actions { display: flex; gap: 12px; justify-content: center; margin-top: 28px; }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 11px 22px; border-radius: 10px; border: none;
            font-size: 0.88rem; font-weight: 600; cursor: pointer;
            text-decoration: none; transition: all 0.2s;
        }
        .btn-primary { background: linear-gradient(135deg,#238636,#2ea043); color: white; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-outline { background: #21262d; border: 1px solid #30363d; color: #e6edf3; }
        .btn-outline:hover { border-color: #58a6ff; color: #58a6ff; }
    </style>
</head>
<body>
    <div class="error-box">
        <div class="error-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
        <h1>Something went wrong</h1>
        <p style="color:#8b949e;font-size:0.88rem">An error occurred while processing your request.</p>
        <div class="error-msg">
            <i class="fa-solid fa-circle-info"></i>
            <span>{{ message }}</span>
        </div>
        <div class="actions">
            <a href="/" class="btn btn-primary"><i class="fa-solid fa-house-medical"></i> Go to Dashboard</a>
            <button onclick="history.back()" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> Go Back</button>
        </div>
    </div>
</body>
</html>
